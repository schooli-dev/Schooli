<main class="password-page min-vh-100 d-flex align-items-center justify-content-center">
  <section class="card password-card border-0 shadow-lg">
    <div class="card-body p-4 p-sm-5">
      <div class="text-center mb-4">
        <div class="lock-circle mx-auto mb-3">
          <i class="bi bi-shield-lock"></i>
        </div>
        <h1 class="h3 fw-bold mb-2">Change your password</h1>
        <p class="text-muted mb-0">For account security, set a new password before opening your dashboard.</p>
      </div>

      <form #passwordForm="ngForm" (ngSubmit)="submit()" novalidate>
        <div class="mb-3">
          <label class="form-label fw-semibold">New Password</label>
          <div class="input-group input-group-lg">
            <input
              class="form-control"
              name="newPassword"
              [(ngModel)]="newPassword"
              [type]="showPassword() ? 'text' : 'password'"
              autocomplete="new-password"
              required
            />
            <button class="btn btn-outline-secondary" type="button" (click)="togglePassword()">
              <i class="bi" [class.bi-eye]="!showPassword()" [class.bi-eye-slash]="showPassword()"></i>
            </button>
          </div>
          <small class="text-muted d-block mt-2">
            Minimum 8 characters with uppercase, lowercase, number, and special character.
          </small>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Confirm Password</label>
          <input
            class="form-control form-control-lg"
            name="confirmPassword"
            [(ngModel)]="confirmPassword"
            type="password"
            autocomplete="new-password"
            required
          />
        </div>

        @if (error()) {
          <div class="alert alert-danger">
            <i class="bi bi-exclamation-triangle me-2"></i>
            {{ error() }}
          </div>
        }

        <button class="btn btn-primary btn-lg w-100 fw-bold" type="submit" [disabled]="passwordForm.invalid || loading()">
          @if (loading()) {
            <span class="spinner-border spinner-border-sm me-2"></span>
          }
          Update Password
        </button>
      </form>
    </div>
  </section>
</main>
